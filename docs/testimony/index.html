vation works proposed to be conducted there…\r\n\r\n48. I did not carry out any inspection at Wang Fuk Court during the period of the fh/hr system was shut down. It is my understanding that no personnel of China Status did so during this period.\r\n\r\n55. based on Gordon’s and/or Mr Cheung’s representations, I honestly believed that:\r\na. proper inspection had been carried out, and\r\nb. there were leakage problems with the FS water tanks\r\n\r\n56. Given our previous dealings, which had proceeded without issue, I had no reason to doubt them.\r\n\r\n57. In general, for applications of SDN in WFC project: a. I signed the SDN app forms, and Mr Yim signed the forms FS251\r\n\r\n58. After signing, ms Daisy Chung sent the documents to the FSD by fax\r\n\r\n==\r\n第二份證人供詞\r\n==\r\n18. One of my key responsibilities is to apply for SDNs\r\n\r\n19. I only do so in two situations. First, after I or my staff have inspected the site, and secondly, when I am applying as a RFSIC for another company that is also a RFSIC.\r\n\r\n27. I honestly believed and still believe that this practice is lawful because: a. this is a sensible and reasonable arrangement; b. the actual works are still carried out by a RFSIC; c. no safety risk arises merely because administrative work is handled by another RFSICl and d. This practice is not implemented to bypass any fsd requirements.\r\n\r\n36. I understood it was a legal requirement that these systems had to be shut down personally by a registered FSI contractor or under the supervision of a registered FSI contractor\r\n\r\n37. The reason myself or my colleague did not personally attend to the shutting down of fh/hr systems is because:\r\n(i) I had been informed by Cheung of PC&E at the commencement of our involvement in this project, that Wang Fuk Court building management would handle the physical shutting down of the fh/hr systems, . and that in any event building management would not allow others (which at the time i understood included personnel of CS) inside their premises;\r\n and \r\n(ii) my understanding is no other FSIs had to be disabled for these renovations and it would be prudent to process with the temporary…\r\n\r\n\r\n39. ...I had always understood and believed that PC&E was a RFSIC. \r\n\r\n48. It is noted that the quotation and the invoice stated: 消防處則定每次只可關閉14日，所以要每14日同消防署申請延期，貴司預計停1年\r\n\r\n49. The reference to “1 year” reflected my understand that the entire project at WFC would span approx one year. It referred to the project as a whole, rather than any individual SDN  for any particular building. As the works for different buildings would take place at different times, which may or may not overlap, I used “1 year” as a general reference to avoid unnecessary complication.\r\n\r\n50. The reference to “1 year” was for my own record and general understanding. I did not expect nor intend that any SDN would remain valid for one year.\r\n\r\n60. Before each renewal, I would communicate with Mr Cheung to check whether the repair works had been completed.\r\n\r\n61. I also instructed mr cheung to notify me immediately once the works were completed, and he agreed to do so …\r\n\r\n62. I confirm that no FS251 was submitted….\r\n\r\n65. Based on my knowledge, for the purpose of FS water tank repair works or shutting down the fh/hr system, it is not necessary to shut down the primary switch of the entire fire service system (消防系統總制), not is it necessary to shut down the entire fire service system.\r\n\r\nFSD calls\r\n82. From time to time, the FSD would contact me directly to enquire about the progress of the works. \r\n\r\n83. One such instance occurred in or around sept 2025, as recorded in Bundle…. which is a document produced by the FSD indicating that they contacted me to enquire about the progress.\r\n\r\n84. That record stated that the fh/hr system was incorporative due to FS water tank maintenance. and that …", "url": "witnesses/person-6.html#testimony-testimony-1"}, {"id": "testimony-3", "witness_name": "鍾傑文", "witness_role": "董事", "witness_org": "宏泰消防工程有限公司", "day_id": "day9", "day_label": "", "day_date": "", "witness_id": "person-11", "topic_ids": [], "topic_names": [], "testimony_type_label": "委員會證人陳述書／口供一", "content": "==\r\n第一份證人供詞\r\n==\r\n11. 202511126 1328，林先生因檢宏泰師傅完工，致電本人表示要盡快發出fs251，因消防處向他追問。電話總本人表示連接系統部分不能出證書（包括警鐘gum手、消防栓及消防喉系統），因為宏泰工人於檢查時發現消防水缸沒有儲水，且供水及消防泵電源亦已被關閉。通話過程中，林先生知悉消防泵已被大維修師傅關掉。本人亦要求他提供掛牌紙（即消防裝置關閉通知書），但他未能即時提供，並表示會稍後交予本人。", "url": "witnesses/person-11.html#testimony-testimony-3"}, {"id": "testimony-4", "witness_name": "鍾傑文", "witness_role": "董事", "witness_org": "宏泰消防工程有限公司", "day_id": "day9", "day_label": "", "day_date": "", "witness_id": "person-11", "topic_ids": ["topic-3"], "topic_names": ["消防警報"], "testimony_type_label": "委員會證人陳述書／口供二", "content": "==\r\n第二份證人供詞\r\n==\r\n林在電話中說：「鐘生鐘生，你有無宏泰或者平日時掛牌個啲form啊，我想睇下」，我回應「吓，無wor，我訓緊覺wor，咩事？」\r\n我說，「我地無掛過牌wor」，我反問，「你地唔係掛左牌咩？點解依家反而問我嘅？！」。佢表示文件係管理處，而家（管理處）封左入唔到去，佢哋想了解多些，問我可吾可以send啲我地掛過牌嘅比佢睇下，第二啲都得，我表示無係手。\r\n我說掛牌紙係standard form，係消防處網站找到，你上網search...\r\n\r\n8. 他表示很擔心，今次火災好大獲，並問係咪大維修消防公司掛左牌，就我同佢（林文欣）都無責任。\r\n\r\n我記得我講過，我只是做年檢同維修，大維修嘅消防工程我無參與過，亦不清楚，我怪責佢：「點解明知掛左牌，都唔事先同我地講聲，只係識一直催我們開工，到我地發現有問題，先講。」\r\n\r\n我續說：「我地做年檢時都有mark到有部分gum手損壞和仲要有啲鐘係細聲，點可能會無試啊？！（當晚 傳媒風向是指年檢無認真試）每套喉鹿我地都要貼大餅（一張圓形的檢查label在喉鹿的中間位置），gum手就係隔...」", "url": "witnesses/person-11.html#testimony-testimony-4"}];

function excerpt(text, maxLen) {
  if (!text) return '';
  const clean = text.replace(/\n+/g, ' ').trim();
  return clean.length > maxLen ? clean.slice(0, maxLen) + '…' : clean;
}

function groupByWitness(items) {
  // 按 witness_id 分組，保留順序（以第一次出現為準）
  const order = [];
  const map = {};
  for (const t of items) {
    const wid = t.witness_id || t.id;
    if (!map[wid]) {
      map[wid] = {
        witness_id: wid,
        witness_name: t.witness_name,
        witness_org: t.witness_org,
        witness_role: t.witness_role,
        url: `witnesses/${wid}.html`,
        days: [],
        topic_names: [],
        testimony_type_labels: [],
        best_excerpt: t.content,
      };
      order.push(wid);
    }
    const g = map[wid];
    if (t.day_label && !g.days.includes(t.day_label)) g.days.push(t.day_label);
    for (const n of t.topic_names) {
      if (!g.topic_names.includes(n)) g.topic_names.push(n);
    }
    if (t.testimony_type_label && !g.testimony_type_labels.includes(t.testimony_type_label))
      g.testimony_type_labels.push(t.testimony_type_label);
  }
  return order.map(wid => map[wid]);
}

        <a class="witness-name" href="${g.url}" style="color:inherit;text-decoration:none">${g.witness_name || '—'}</a>
        ${g.witness_org ? `<span class="witness-role">${g.witness_org}</span>` : ''}
        ${g.witness_role ? `<span class="witness-role">（${g.witness_role}）</span>` : ''}
      </div>
      <div class="tags">
        ${g.days.map(d => `<span class="tag tag-day">${d}</span>`).join('')}
        ${g.testimony_type_labels.map(l => `<span class="tag" style="background:#f5f3ff;color:#6d28d9">${l}</span>`).join('')}
        ${g.topic_names.map(n => `<span class="tag">${n}</span>`).join('')}
      </div>
      <div class="excerpt">${excerpt(g.best_excerpt, 180)}</div>
    </div>
  `).join('');
}

function doFilter() {
  const query   = searchInput.value.trim();
  const dayVal  = filterDay.value;
  const witnessVal = filterWitness.value;
  const topicVal= filterTopic.value;

  let results = query ? fuse.search(query).map(r => r.item) : [...DATA];

  if (dayVal)     results = results.filter(t => t.day_id === dayVal);
  if (witnessVal) results = results.filter(t => t.witness_id === witnessVal);
  if (topicVal)   results = results.filter(t => t.topic_ids.includes(topicVal));

  render(results);
}

searchInput.addEventListener('input', doFilter);
filterDay.addEventListener('change', doFilter);
filterWitness.addEventListener('change', doFilter);
filterTopic.addEventListener('change', doFilter);

// 初始顯示
doFilter();
</script>

    </div>
  </div>
</body>
</html>

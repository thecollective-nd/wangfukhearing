name: 部署口供資料庫

on:
  push:
    branches: [main]
    paths:
      - 'data/testimonies.json'
      - 'data/people.json'
      - 'data/days.json'
      - 'data/topics.json'
      - 'data/documents.json'
      - 'data/lawyers.json'
      - 'templates/testimony/**'
      - 'build_testimony.py'
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝依賴
        run: pip install jinja2

      - name: 生成靜態網站
        run: python3 build_testimony.py

      - name: Commit 並推送至 docs/testimony/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/testimony/
          git diff --staged --quiet || git commit -m "自動更新：口供資料庫 [skip ci]"
          git push

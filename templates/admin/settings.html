{% extends "admin/base.html" %}
{% block title %}網站設定{% endblock %}
{% block page_title %}⚙️ 網站設定{% endblock %}

{% block content %}
<div class="card" style="max-width:600px">
  <h3>基本設定</h3>
  <form method="post">
    <label>網站標題</label>
    <input type="text" name="site_title" value="{{ settings.site_title }}">
    <label>副標題</label>
    <input type="text" name="site_subtitle" value="{{ settings.site_subtitle }}">
    <label>網站簡介</label>
    <textarea name="site_description" rows="3">{{ settings.site_description }}</textarea>
    <label>GitHub Pages 網址（設定後方可一鍵發布）</label>
    <input type="text" name="github_repo" value="{{ settings.github_repo }}" placeholder="例：https://username.github.io/repo-name">

    <div style="margin-top:8px;padding:16px;background:#fafafa;border:1px solid #e2e8f0;border-radius:6px">
      <div style="font-weight:700;margin-bottom:10px;font-size:14px">網站公開狀態</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <label style="display:flex;align-items:center;gap:10px;font-weight:400;cursor:pointer">
          <input type="radio" name="coming_soon" value="true" {% if settings.coming_soon %}checked{% endif %}>
          <span>
            <strong>🔒 整理中（外界不可見）</strong><br>
            <span style="font-size:12px;color:#6b7280">發布時外界看到「整理中」頁面，本地預覽仍可看到完整內容</span>
          </span>
        </label>
        <label style="display:flex;align-items:center;gap:10px;font-weight:400;cursor:pointer">
          <input type="radio" name="coming_soon" value="false" {% if not settings.coming_soon %}checked{% endif %}>
          <span>
            <strong>🌐 正式上線（外界可見）</strong><br>
            <span style="font-size:12px;color:#6b7280">發布時完整內容公開給所有人</span>
          </span>
        </label>
      </div>
    </div>

    <button type="submit" class="btn btn-primary" style="margin-top:14px">儲存設定</button>
  </form>
</div>
{% endblock %}

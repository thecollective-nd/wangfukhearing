<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %}{% if self.title() %} — {% endif %}{{ settings.site_title }}</title>
  <meta name="description" content="{{ settings.site_description }}">
  <link rel="stylesheet" href="{{ depth }}assets/style.css">
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <div class="site-name">
      <a href="{{ depth }}index.html" style="color:inherit;text-decoration:none">{{ settings.site_title }}</a>
    </div>
    <div class="site-subtitle">{{ settings.site_subtitle }}</div>
  </div>
</header>

<nav class="site-nav">
  <div class="site-nav-inner">
    <a href="{{ depth }}index.html" {% block nav_home %}{% endblock %}>首頁</a>
    <a href="{{ depth }}days/index.html" {% block nav_days %}{% endblock %}>聽證日誌</a>
    <a href="{{ depth }}topics/index.html" {% block nav_topics %}{% endblock %}>議題追蹤</a>
    <a href="{{ depth }}people/index.html" {% block nav_people %}{% endblock %}>人物機構</a>
  </div>
</nav>

<div class="page-wrap">
  {% block content %}{% endblock %}
</div>

<footer class="site-footer">
  <p>資料整理自各大傳媒報道，謄本由 Epiq 編製。最後更新：{{ build_time }}</p>
</footer>

</body>
</html>

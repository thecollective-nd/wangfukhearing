{% extends "testimony/base.html" %}
{% set root = '.' %}
{% set section = 'lawyers' %}
{% block title %}代表律師{% endblock %}

{% block content %}
<div>
  <h1 style="font-size:22px;font-weight:700;color:#0f172a;margin-bottom:24px">{{ lawyers.title }}</h1>

  <div class="card">
    <table style="width:100%;border-collapse:collapse">
      <thead>
        <tr>
          <th style="text-align:left;padding:10px 14px;font-size:12px;font-weight:700;color:#6b7280;background:#f8fafc;border-bottom:1px solid #e2e8f0">當事方</th>
          <th style="text-align:left;padding:10px 14px;font-size:12px;font-weight:700;color:#6b7280;background:#f8fafc;border-bottom:1px solid #e2e8f0">代表律師</th>
        </tr>
      </thead>
      <tbody>
        {% for entry in lawyers.entries %}
        <tr>
          <td style="padding:12px 14px;border-bottom:1px solid #f1f5f9;font-weight:600">{{ entry.party }}</td>
          <td style="padding:12px 14px;border-bottom:1px solid #f1f5f9;color:#374151">{{ entry.lawyers }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
